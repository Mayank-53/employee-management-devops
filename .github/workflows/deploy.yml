name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches:
      - main
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            cd /apps/employee-management

            ./scripts/backup.sh

            git pull origin main

            aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 104875667953.dkr.ecr.eu-north-1.amazonaws.com

            docker compose pull

            docker compose up -d

            docker image prune -f

            curl -f http://localhost:8000/health
